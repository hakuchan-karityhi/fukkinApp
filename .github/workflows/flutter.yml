name: Flutter CI

on:
  push:
    branches: [main, develop]
    paths:
      - "app/**"
      - ".github/workflows/flutter.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "app/**"
      - ".github/workflows/flutter.yml"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
