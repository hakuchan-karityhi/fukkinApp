name: fukkin
description: ふっきん（Plank Buddy）— ストリーク習慣化プランクアプリ
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  drift: ^2.28.0
  sqlite3_flutter_libs: ^0.5.34
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.28.0
  build_runner: ^2.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/master/
    - assets/character/
    - assets/lottie/
